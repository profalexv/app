version: '3.8'

services:
  aula:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
    volumes: []
    restart: unless-stopped
    networks:
      - aula-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/schools"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Opcional: Nginx como reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - aula
    networks:
      - aula-network
    restart: unless-stopped
    profiles:
      - with-nginx

volumes: {}

networks:
  aula-network:
    driver: bridge
