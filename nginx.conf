# Configuração Nginx para AULA
# Proxy reverso e cache

upstream aula {
  server aula:3000;
  keepalive 32;
}

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=aula_cache:10m max_size=1g 
                 inactive=60m use_temp_path=off;

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=1000r/m;

# Servidor HTTP (redireciona para HTTPS em produção)
server {
  listen 80;
  server_name _;

  # Health check
  location /health {
    proxy_pass http://aula;
    access_log off;
  }

  # Redireciona para HTTPS (em produção)
  # location / {
  #   return 301 https://$host$request_uri;
  # }
  
  # Comentado para desenvolvimento, descomentar em produção com certificado SSL
  location / {
    proxy_pass http://aula;
    proxy_http_version 1.1;
    proxy_set_header Connection "upgrade";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|gif|woff|woff2|ttf|eot)$ {
      proxy_cache aula_cache;
      proxy_cache_valid 200 7d;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      add_header X-Cache-Status $upstream_cache_status;
      expires 7d;
    }

    # API com rate limiting
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://aula;
    }

    # APP com rate limiting maior
    location /app/ {
      limit_req zone=app_limit burst=50 nodelay;
      proxy_pass http://aula;
    }
  }
}

